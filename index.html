<!DOCTYPE html>
<html>
<head>

<title>Zenkai AI</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chatbox{
width:400px;
height:600px;
background:#111;
border-radius:20px;
box-shadow:0 0 30px #bb00ff;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:#bb00ff;
padding:20px;
font-size:24px;
text-align:center;
font-weight:bold;
}

.messages{
flex:1;
padding:20px;
overflow-y:auto;
}

.message{
background:#222;
padding:12px;
margin-bottom:10px;
border-radius:10px;
}

.user{
background:#bb00ff;
}

.input-area{
display:flex;
padding:10px;
background:#000;
}

input{
flex:1;
padding:15px;
border:none;
outline:none;
background:#222;
color:white;
border-radius:10px;
}

button{
margin-left:10px;
padding:15px;
border:none;
background:#bb00ff;
color:white;
border-radius:10px;
}

</style>

</head>

<body>

<div class="chatbox">

<div class="header">
👾 Zenkai AI
</div>

<div class="messages" id="messages">

<div class="message">
Hello Nishchal 👋
I am your futuristic AI assistant.
</div>

</div>

<div class="input-area">

<input type="text" id="input" placeholder="Ask something...">

<button onclick="sendMessage()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

</div>
async function getAIResponse(userText){

let response = await fetch("https://api.affiliateplus.xyz/api/chatbot?message=" + userText + "&botname=ZenkaiAI&ownername=Nishchal");

let data = await response.json();

return data.message;

}
<script>

function sendMessage(){

let input = document.getElementById("input");

let text = input.value;

if(text==="") return;

let messages = document.getElementById("messages");

let userMessage = document.createElement("div");

userMessage.className = "message user";

userMessage.innerText = text;

messages.appendChild(userMessage);

let aiMessage = document.createElement("div");

aiMessage.className = "message";

  getAIResponse(text).then(reply => {
aiMessage.innerText = reply;
});

messages.appendChild(aiMessage);

setTimeout(()=>{

aiMessage.innerText =
"👾 I received your message: " + text;

},1000);

input.value="";

messages.scrollTop = messages.scrollHeight;

}
function startVoice(){

let recognition = new webkitSpeechRecognition();

recognition.lang = "en-US";

recognition.start();

recognition.onresult = function(event){

document.getElementById("input").value =
event.results[0][0].transcript;

sendMessage();

}

}
</script>

</body>
</html>

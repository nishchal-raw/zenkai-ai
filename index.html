1<!DOCTYPE html>
<html>
<head>

<title>Zenkai AI</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:black;
    position:relative;
}

/* Dragon Background */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;

    background:url('https://i.imgur.com/9QZ7G6Y.png');
    background-size:cover;
    background-position:center;

    opacity:0.28;

    animation:dragonMove 20s infinite alternate ease-in-out;

    z-index:-2;
}

/* Purple Fire Glow */
body::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;

    background:
    radial-gradient(circle at 78% 32%,
    rgba(255,0,255,0.55),
    transparent 18%),

    radial-gradient(circle at center,
    rgba(80,0,120,0.25),
    rgba(0,0,0,0.92));

    animation:fireGlow 3s infinite alternate;

    z-index:-1;
}

/* Dragon movement */
@keyframes dragonMove{

    0%{
        transform:
        scale(1)
        translateX(0px)
        translateY(0px);
    }

    50%{
        transform:
        scale(1.05)
        translateX(-20px)
        translateY(-10px);
    }

    100%{
        transform:
        scale(1.1)
        translateX(20px)
        translateY(10px);
    }
}

@keyframes fireGlow{

    0%{
        filter:brightness(1);
    }

    100%{
        filter:brightness(1.6);
    }
}
    .chat-container{
    width:340px;
    height:600px;
    background:rgba(20,20,30,0.55);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 0 40px #ff00ff;
    display:flex;
    flex-direction:column;
}

.header{
    padding:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:white;
    background:rgba(255,255,255,0.05);
}

.messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
    color:white;
}

.message{
    background:#2b2b3d;
    padding:12px;
    margin:10px 0;
    border-radius:15px;
    color:white;
}

.user{
    background:#ff00ff;
}

.input-area{
    display:flex;
    padding:10px;
    background:rgba(0,0,0,0.4);
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:15px;
    background:#1e1e1e;
    color:white;
}

button{
    margin-left:8px;
    border:none;
    border-radius:15px;
    padding:12px 16px;
    background:#ff00ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 15px #ff00ff;
}
    .ai-orb{
    width:80px;
    height:80px;
    margin:0 auto 10px;
    border-radius:50%;
    background:radial-gradient(circle,#ff00ff,#6a00ff,#000);
    box-shadow:
    0 0 20px #ff00ff,
    0 0 60px #6a00ff;
    animation:floatOrb 3s infinite ease-in-out;
}

@keyframes floatOrb{
    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-12px);
    }

    100%{
        transform:translateY(0px);
    }
}
</style>

</head>

<body>

<div class="chat-container">

<div class="header">
    <div class="ai-orb"></div>
👾 Zenkai AI
</div>

<div class="messages" id="messages">

<div class="message">
⚡ Zenkai AI Online

Ask me anything...
</div>

</div>

<div class="input-area">

<input type="text" id="input" placeholder="Ask something...">

<button onclick="sendMessage()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

</div>

<script>

function sendMessage(){

let input = document.getElementById("input");

let text = input.value;

if(text==="") return;

let messages = document.getElementById("messages");

let userMessage = document.createElement("div");

userMessage.className = "message user";

userMessage.innerText = text;

messages.appendChild(userMessage);

let aiMessage = document.createElement("div");

aiMessage.className = "message";

aiMessage.innerText = "🤖 Thinking...";

messages.appendChild(aiMessage);

getAIResponse(text).then(reply => {

aiMessage.innerText = reply;

});

input.value="";

messages.scrollTop = messages.scrollHeight;

}

async function getAIResponse(userText){

userText = userText.toLowerCase();

if(userText.includes("hello")){
return "👋 Hello! I am Zenkai AI.";
}

else if(userText.includes("your name")){
return "🤖 My name is Zenkai AI.";
}

else if(userText.includes("who made you")){
return "⚡ I was created by Nischal Sharma.";
}

else if(userText.includes("how are you")){
return "😎 I am futuristic and fully operational!";
}

else if(userText.includes("bye")){
return "👋 Goodbye Commander!";
}

else{
return "⚡ Zenkai AI is learning new responses...";
}

}

function startVoice(){

let recognition = new webkitSpeechRecognition();

recognition.lang = "en-US";

recognition.start();

recognition.onresult = function(event){

document.getElementById("input").value =
event.results[0][0].transcript;

sendMessage();

}

}

</script>

</body>
</html>

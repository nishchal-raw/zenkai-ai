1<!DOCTYPE html>
<html>
<head>

<title>Zenkai AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#0f0c29,#302b63,#24243e);
overflow:hidden;
}

body::before{
content:'';
position:absolute;
width:600px;
height:600px;
background:#bb00ff;
filter:blur(200px);
opacity:0.3;
top:-100px;
left:-100px;
animation:move 8s infinite alternate;
}

@keyframes move{
from{
transform:translateX(0px);
}
to{
transform:translateX(200px);
}
}

.chatbox{
position:relative;
width:420px;
height:650px;
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:30px;
overflow:hidden;
box-shadow:
0 0 30px rgba(187,0,255,0.5);
display:flex;
flex-direction:column;
z-index:1;
}

.header{
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:white;
background:rgba(255,255,255,0.05);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.avatar{
.ai-orb{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
background:radial-gradient(circle,
#ff00ff,
#6a00ff,
#00f0ff);

box-shadow:
0 0 20px #ff00ff,
0 0 40px #6a00ff,
0 0 60px #00f0ff;

animation:
float 3s ease-in-out infinite,
rotate 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0px);}
}

@keyframes rotate{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}

.chatbox{
  border:1px solid rgba(255,255,255,0.15);
transform-style:preserve-3d;
transition:0.4s;
}

.chatbox:hover{
transform:
rotateX(6deg)
rotateY(-6deg)
scale(1.02);
}
}

@keyframes glow{
from{
box-shadow:0 0 20px #ff00ff;
}
to{
box-shadow:0 0 50px #00ffff;
}
}

.messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:15px;
}

.message{
padding:15px;
border-radius:20px;
max-width:80%;
font-size:15px;
line-height:1.5;
background:rgba(255,255,255,0.08);
color:white;
backdrop-filter:blur(10px);
}

.user{
align-self:flex-end;
background:#bb00ff;
}

.input-area{
display:flex;
padding:15px;
gap:10px;
background:rgba(255,255,255,0.05);
border-top:1px solid rgba(255,255,255,0.1);
}

input{
flex:1;
padding:15px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,0.08);
color:white;
font-size:15px;
}

button{
border:none;
padding:15px;
border-radius:15px;
background:#bb00ff;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ff00ff;
}
  .ai-orb{
width:80px;
height:80px;
margin:auto;
margin-bottom:15px;
border-radius:50%;
background:
radial-gradient(circle,
#00ffff,
#ff00ff,
#6a00ff);

box-shadow:
0 0 30px #00ffff,
0 0 60px #ff00ff,
0 0 90px #6a00ff;

animation:
pulse 2s infinite alternate,
spin 8s linear infinite;
}

@keyframes pulse{
from{
transform:scale(1);
}
to{
transform:scale(1.15);
}
}

@keyframes spin{
from{
filter:hue-rotate(0deg);
}
to{
filter:hue-rotate(360deg);
}
}

.message{
animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0px);
}
}
  
  body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(10,0,30,0.7),
rgba(20,0,40,0.8)),

url('https://media.tenor.com/qJ5evVs-_uUAAAAC/dragon-anime.gif');

background-size:cover;
background-position:center;
font-family:sans-serif;
overflow:hidden;
</style>

</head>

<body>

<div class="chatbox">

<div class="header">
   
👾 Zenkai AI
</div>

<div class="messages" id="messages">

<div class="message">
⚡ Zenkai AI Online

Ask me anything...
</div>

</div>

<div class="input-area">

<input type="text" id="input" placeholder="Ask something...">

<button onclick="sendMessage()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

</div>

<script>

function sendMessage(){

let input = document.getElementById("input");

let text = input.value;

if(text==="") return;

let messages = document.getElementById("messages");

let userMessage = document.createElement("div");

userMessage.className = "message user";

userMessage.innerText = text;

messages.appendChild(userMessage);

let aiMessage = document.createElement("div");

aiMessage.className = "message";

aiMessage.innerText = "🤖 Thinking...";

messages.appendChild(aiMessage);

getAIResponse(text).then(reply => {

aiMessage.innerText = reply;

});

input.value="";

messages.scrollTop = messages.scrollHeight;

}

async function getAIResponse(userText){

userText = userText.toLowerCase();

if(userText.includes("hello")){
return "👋 Hello! I am Zenkai AI.";
}

else if(userText.includes("your name")){
return "🤖 My name is Zenkai AI.";
}

else if(userText.includes("who made you")){
return "⚡ I was created by Nischal Sharma.";
}

else if(userText.includes("how are you")){
return "😎 I am futuristic and fully operational!";
}

else if(userText.includes("bye")){
return "👋 Goodbye Commander!";
}

else{
return "⚡ Zenkai AI is learning new responses...";
}

}

function startVoice(){

let recognition = new webkitSpeechRecognition();

recognition.lang = "en-US";

recognition.start();

recognition.onresult = function(event){

document.getElementById("input").value =
event.results[0][0].transcript;

sendMessage();

}

}

</script>

</body>
</html>

/* ===== FUTURISTIC AI BACKGROUND ===== */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;

/* Neon Glow Orb 1 */

body::before{
content:"";
position:absolute;
width:320px;
height:320px;
border-radius:50%;

background:
radial-gradient(circle,
rgba(255,0,255,0.8),
transparent 70%);

top:5%;
left:0%;

filter:blur(60px);

animation:orbMove1 10s infinite alternate ease-in-out;
}

/* Neon Glow Orb 2 */

body::after{
content:"";
position:absolute;
width:280px;
height:280px;
border-radius:50%;

background:
radial-gradient(circle,
rgba(0,255,255,0.7),
transparent 70%);

bottom:0%;
right:0%;

filter:blur(70px);

animation:orbMove2 12s infinite alternate ease-in-out;
}

/* Background Animation */

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* Orb Animation */

@keyframes orbMove1{

0%{
transform:translate(0px,0px) scale(1);
}

100%{
transform:translate(120px,60px) scale(1.3);
}

}

@keyframes orbMove2{

0%{
transform:translate(0px,0px) scale(1);
}

100%{
transform:translate(-100px,-80px) scale(1.2);
}

}

<script>
let savedChats =
JSON.parse(localStorage.getItem("zenkaiChats")) || [];

let allChats = JSON.parse(localStorage.getItem("zenkaiChats")) || [];
let currentChat = savedChats;
window.onload = function(){

let messages =
document.getElementById("messages");

savedChats.forEach(chat => {

let div =
document.createElement("div");

if(chat.sender === "user"){
div.className = "message user";
}else{
div.className = "message";
}

div.innerText = chat.text;

messages.appendChild(div);

});

}
/* SEND MESSAGE */

function sendMessage(){

let input = document.getElementById("input");
let text = input.value.trim();

if(text === "") return;

let messages = document.getElementById("messages");

/* USER MESSAGE */

let userMessage = document.createElement("div");
userMessage.className = "message user";
userMessage.innerText = text;

messages.appendChild(userMessage);

currentChat.push({
sender:"user",
text:text
});

/* AI MESSAGE */

let aiMessage = document.createElement("div");
aiMessage.className = "message";
aiMessage.innerText = "🤖 Thinking...";

messages.appendChild(aiMessage);

setTimeout(()=>{

aiMessage.innerText = getAIResponse(text);

currentChat.push({
sender:"ai",
text:aiMessage.innerText
});

saveChat();

},800);

input.value = "";

messages.scrollTop = messages.scrollHeight;

}

/* AI RESPONSE */

function getAIResponse(userText){

userText = userText.toLowerCase();

if(userText.includes("hello")){
return "👋 Hello! I am Zenkai AI.";
}

else if(userText.includes("your name")){
return "🤖 My name is Zenkai AI.";
}
  
else if(userText.includes("nischal")){
return "😎 Nischal Sharma is creator of Zenkai AI.";
}

else if(userText.includes("harshita")){
return "😜 Harshita Sharma is sister of Nischal Sharma.";
}
  else if(userText.includes("nischal")){
return "😎 Nischal Sharma is a great person from Ajmer, Rajasthan, India. He started his ECE BTech studies in 2026.";
}

else if(userText.includes("harshita")){
return "🤪 Harshita Sharma is the sister of Nischal Sharma. She is from Ajmer, Rajasthan, India. Her nicknames are Dingi Bai, Padodi, and Harshu.";
  }
  
else if(userText.includes("who made you")){
return "⚡ I was created by Nischal Sharma.";
}

else if(userText.includes("how are you")){
return "😎 I am futuristic and fully operational!";
}

else if(userText.includes("preeti")){
return "👩 Preeti Sharma is mother of Nischal and Harshita Sharma.";
}

else if(userText.includes("ashish")){
return "👨 Ashish Sharma is father of Nischal Sharma and Harshita Sharma.";
}

else if(userText.includes("nischal birth")){
return "🎂 Nischal Sharma was born on 29 February 2008.";
}

else if(userText.includes("harshita birth")){
return "🎂 Harshita Sharma was born on 20 May 2014.";
}

else if(userText.includes("preeti birth")){
return "🎂 Preeti Sharma was born on 15 July 1982.";
}

else if(userText.includes("ashish birth")){
return "🎂 Ashish Sharma was born on 5 September 1981.";
}

else if(userText.includes("ece")){
return "📚 Nischal Sharma is preparing for ECE BTech.";
}

else if(userText.includes("your creator")){
return "⚡ My creator is Nischal Sharma.";
}

else if(userText.includes("india")){
return "🇮🇳 India is a powerful and developing country.";
}

else if(userText.includes("ai")){
return "🤖 Artificial Intelligence is the future technology.";
}

else if(userText.includes("motivate me")){
return "🔥 Never give up bro. Success takes time.";
}

else if(userText.includes("study")){
return "📖 Consistency is the key to success in studies.";
}

else if(userText.includes("who are you")){
return "🤖 I am Zenkai AI, your futuristic assistant.";
}

else if(userText.includes("good morning")){
return "🌞 Good Morning Commander!";
}

else if(userText.includes("good night")){
return "🌙 Good Night Commander!";
}

else if(userText.includes("time")){
return "⏰ Time is very valuable. Use it wisely.";
}

else if(userText.includes("money")){
return "💸 Money is important, but knowledge is more powerful.";
}

else if(userText.includes("dollar")){
return "💵 1 US Dollar is around 83-85 Indian Rupees.";
}

else if(userText.includes("bitcoin")){
return "₿ Bitcoin is the world's most famous cryptocurrency.";
}

else if(userText.includes("rupee")){
return "💰 Indian Rupee is the currency of India.";
}
  
else if(userText.includes("bye")){
return "👋 Goodbye Commander!";
}

else{
return "⚡ Zenkai AI is learning new responses...";
}

}

/* ENTER KEY */

document.getElementById("input")
.addEventListener("keydown",function(event){

if(event.key === "Enter"){
event.preventDefault();
sendMessage();
}

});

/* MIC */

function startVoice(){

if(!window.SpeechRecognition &&
!window.webkitSpeechRecognition){

alert("Voice not supported");
return;

}

let recognition =
new(window.SpeechRecognition ||
window.webkitSpeechRecognition)();

recognition.lang = "en-US";

recognition.start();

recognition.onresult = function(event){

let transcript =
event.results[0][0].transcript;

document.getElementById("input").value =
transcript;

sendMessage();

};

recognition.onerror = function(){

alert("Mic permission denied");

};

}

/* SIDEBAR */

function openSidebar(){

let sidebar =
document.getElementById("sidebar");

if(window.innerWidth <= 768){

if(sidebar.style.left === "0px"){

sidebar.style.left = "-240px";

}else{

sidebar.style.left = "0px";

}

}else{

if(sidebar.style.left === "0px"){

sidebar.style.left = "-270px";

}else{

sidebar.style.left = "0px";

}

}

}

/* NEW CHAT */

function newChat(){

document.getElementById("messages")
.innerHTML = "";

currentChat = [];

/* create empty slot */

allChats.push([]);

localStorage.setItem(
"zenkaiChats",
JSON.stringify(allChats)
);

loadSidebarChats();

}

/* CLEAR CHAT */

function clearChat(){

document.getElementById("messages")
.innerHTML = "";

currentChat = [];
localStorage.removeItem("zenkaiChats");
}

/* SAVE CHAT */

function saveChat(){

if(currentChat.length === 0) return;

/* agar first time hai */
if(allChats.length === 0){
allChats.push([...currentChat]);
}
localStorage.setItem(
"zenkaiChats",
JSON.stringify(allChats)
);
/* latest chat update karo */
allChats[allChats.length - 1] = [...currentChat];

localStorage.setItem(
"zenkaiChats",
JSON.stringify(allChats)
);

loadSidebarChats();

}



/* THEME */

function toggleTheme(){

if(document.body.classList.contains("light")){

document.body.classList.remove("light");

document.body.style.background =
"linear-gradient(-45deg,#050010,#140021,#240046,#000000)";

}else{

document.body.classList.add("light");

document.body.style.background =
"linear-gradient(135deg,#000,#240046,#ff00ff)";

}

}
window.onload = function(){

allChats =
JSON.parse(
localStorage.getItem("zenkaiChats")
) || [];

if(allChats.length === 0){

allChats.push([]);

}

currentChat =
allChats[allChats.length - 1];

loadSidebarChats();

  }
</script>

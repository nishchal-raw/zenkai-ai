1<!DOCTYPE html>
<html>
<head>

<title>Zenkai AI</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:black;
    position:relative;
}

/* Dragon Background */
body::before{
    content:"";
    position:absolute;
    width:120%;
    height:120%;
    background:url('https://images.unsplash.com/photo-1518709268805-4e9042af2176?q=80&w=1200&auto=format&fit=crop') center/cover no-repeat;
    filter:brightness(0.35) blur(2px);
    animation:dragonMove 20s infinite alternate ease-in-out;
    z-index:-2;
}

/* Purple Fire Glow */
body::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at center,
    rgba(255,0,255,0.15),
    rgba(0,0,0,0.85));
    z-index:-1;
}

/* Dragon movement */
@keyframes dragonMove{
    0%{
        transform:scale(1) translateX(0px);
    }

    50%{
        transform:scale(1.05) translateX(-20px);
    }

    100%{
        transform:scale(1.1) translateX(20px);
    }
}
</style>

</head>

<body>

<div class="chatbox">

<div class="header">
   
👾 Zenkai AI
</div>

<div class="messages" id="messages">

<div class="message">
⚡ Zenkai AI Online

Ask me anything...
</div>

</div>

<div class="input-area">

<input type="text" id="input" placeholder="Ask something...">

<button onclick="sendMessage()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

</div>

<script>

function sendMessage(){

let input = document.getElementById("input");

let text = input.value;

if(text==="") return;

let messages = document.getElementById("messages");

let userMessage = document.createElement("div");

userMessage.className = "message user";

userMessage.innerText = text;

messages.appendChild(userMessage);

let aiMessage = document.createElement("div");

aiMessage.className = "message";

aiMessage.innerText = "🤖 Thinking...";

messages.appendChild(aiMessage);

getAIResponse(text).then(reply => {

aiMessage.innerText = reply;

});

input.value="";

messages.scrollTop = messages.scrollHeight;

}

async function getAIResponse(userText){

userText = userText.toLowerCase();

if(userText.includes("hello")){
return "👋 Hello! I am Zenkai AI.";
}

else if(userText.includes("your name")){
return "🤖 My name is Zenkai AI.";
}

else if(userText.includes("who made you")){
return "⚡ I was created by Nischal Sharma.";
}

else if(userText.includes("how are you")){
return "😎 I am futuristic and fully operational!";
}

else if(userText.includes("bye")){
return "👋 Goodbye Commander!";
}

else{
return "⚡ Zenkai AI is learning new responses...";
}

}

function startVoice(){

let recognition = new webkitSpeechRecognition();

recognition.lang = "en-US";

recognition.start();

recognition.onresult = function(event){

document.getElementById("input").value =
event.results[0][0].transcript;

sendMessage();

}

}

</script>

</body>
</html>

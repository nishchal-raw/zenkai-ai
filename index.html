1<!DOCTYPE html>
<html>
<head>

<title>Zenkai AI</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:black;
    position:relative;
}
/* ===== FUTURISTIC AI BACKGROUND ===== */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:Arial,sans-serif;

background:
linear-gradient(-45deg,
#050010,
#140021,
#240046,
#000000);

background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

/* Neon Glow Orb 1 */

body::before{
content:"";
position:absolute;
width:320px;
height:320px;
border-radius:50%;

background:
radial-gradient(circle,
rgba(255,0,255,0.8),
transparent 70%);

top:5%;
left:0%;

filter:blur(60px);

animation:orbMove1 10s infinite alternate ease-in-out;
}

/* Neon Glow Orb 2 */

body::after{
content:"";
position:absolute;
width:280px;
height:280px;
border-radius:50%;

background:
radial-gradient(circle,
rgba(0,255,255,0.7),
transparent 70%);

bottom:0%;
right:0%;

filter:blur(70px);

animation:orbMove2 12s infinite alternate ease-in-out;
}

/* Background Animation */

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* Orb Animation */

@keyframes orbMove1{

0%{
transform:translate(0px,0px) scale(1);
}

100%{
transform:translate(120px,60px) scale(1.3);
}

}

@keyframes orbMove2{

0%{
transform:translate(0px,0px) scale(1);
}

100%{
transform:translate(-100px,-80px) scale(1.2);
}

}

/* Floating Chatbox */

.chatbox{

width:340px;
height:620px;

border-radius:30px;

background:rgba(15,15,25,0.35);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 0 30px rgba(255,0,255,0.6),
0 0 80px rgba(255,0,255,0.4);

animation:floatBox 4s ease-in-out infinite;
}

/* Floating Effect */

@keyframes floatBox{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0px);
}

}


    .chat-container{
    width:340px;
    height:600px;
    background:rgba(20,20,30,0.55);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 0 40px #ff00ff;
    display:flex;
    flex-direction:column;
}

.header{
    padding:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:white;
    background:rgba(255,255,255,0.05);
}

.messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
    color:white;
}

.message{
    background:#2b2b3d;
    padding:12px;
    margin:10px 0;
    border-radius:15px;
    color:white;
}

.user{
    background:#ff00ff;
}

.input-area{
    display:flex;
    padding:10px;
    background:rgba(0,0,0,0.4);
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:15px;
    background:#1e1e1e;
    color:white;
}

button{
    margin-left:8px;
    border:none;
    border-radius:15px;
    padding:12px 16px;
    background:#ff00ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 15px #ff00ff;
}
    .ai-orb{
    width:80px;
    height:80px;
    margin:0 auto 10px;
    border-radius:50%;
    background:radial-gradient(circle,#ff00ff,#6a00ff,#000);
    box-shadow:
    0 0 20px #ff00ff,
    0 0 60px #6a00ff;
    animation:floatOrb 3s infinite ease-in-out;
}

@keyframes floatOrb{
    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-12px);
    }

    100%{
        transform:translateY(0px);
    }
}
</style>

</head>

<body>

<div class="chat-container">

<div class="header">
    <div class="ai-orb"></div>
👾 Zenkai AI
</div>

<div class="messages" id="messages">

<div class="message">
⚡ Zenkai AI Online

Ask me anything...
</div>

</div>

<div class="input-area">

<input type="text" id="input" placeholder="Ask something...">

<button onclick="sendMessage()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

</div>

<script>

function sendMessage(){

let input = document.getElementById("input");

let text = input.value;

if(text==="") return;

let messages = document.getElementById("messages");

let userMessage = document.createElement("div");

userMessage.className = "message user";

userMessage.innerText = text;

messages.appendChild(userMessage);

let aiMessage = document.createElement("div");

aiMessage.className = "message";

aiMessage.innerText = "🤖 Thinking...";

messages.appendChild(aiMessage);

getAIResponse(text).then(reply => {

aiMessage.innerText = reply;

});

input.value="";

messages.scrollTop = messages.scrollHeight;

}

async function getAIResponse(userText){

userText = userText.toLowerCase();

if(userText.includes("hello")){
return "👋 Hello! I am Zenkai AI.";
}

else if(userText.includes("your name")){
return "🤖 My name is Zenkai AI.";
}

else if(userText.includes("who made you")){
return "⚡ I was created by Nischal Sharma.";
}

else if(userText.includes("how are you")){
return "😎 I am futuristic and fully operational!";
}

else if(userText.includes("bye")){
return "👋 Goodbye Commander!";
}

else{
return "⚡ Zenkai AI is learning new responses...";
}

}

function startVoice(){

let recognition = new webkitSpeechRecognition();

recognition.lang = "en-US";

recognition.start();

recognition.onresult = function(event){

document.getElementById("input").value =
event.results[0][0].transcript;

sendMessage();

}

}

</script>

</body>
</html>

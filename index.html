1<!DOCTYPE html>
<html>
<head>

<title>Zenkai AI</title>

<style>
body{
  
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:black;
    position:relative;
}
/* ===== FUTURISTIC AI BACKGROUND ===== */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:Arial,sans-serif;

padding-top:70px;
  background:
linear-gradient(-45deg,
#050010,
#140021,
#240046,
#000000);

background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

/* Neon Glow Orb 1 */

body::before{
content:"";
position:absolute;
width:320px;
height:320px;
border-radius:50%;

background:
radial-gradient(circle,
rgba(255,0,255,0.8),
transparent 70%);

top:5%;
left:0%;

filter:blur(60px);

animation:orbMove1 10s infinite alternate ease-in-out;
}

/* Neon Glow Orb 2 */

body::after{
content:"";
position:absolute;
width:280px;
height:280px;
border-radius:50%;

background:
radial-gradient(circle,
rgba(0,255,255,0.7),
transparent 70%);

bottom:0%;
right:0%;

filter:blur(70px);

animation:orbMove2 12s infinite alternate ease-in-out;
}

/* Background Animation */

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* Orb Animation */

@keyframes orbMove1{

0%{
transform:translate(0px,0px) scale(1);
}

100%{
transform:translate(120px,60px) scale(1.3);
}

}

@keyframes orbMove2{

0%{
transform:translate(0px,0px) scale(1);
}

100%{
transform:translate(-100px,-80px) scale(1.2);
}

}

/* Floating Chatbox */

.chatbox{

width:340px;
height:620px;

border-radius:30px;

background:rgba(15,15,25,0.35);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 0 30px rgba(255,0,255,0.6),
0 0 80px rgba(255,0,255,0.4);

animation:floatBox 4s ease-in-out infinite;
}

/* Floating Effect */

@keyframes floatBox{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-12px);
}

100%{
transform:translateY(0px);
}

}


    .chat-container{
    width:340px;
    height:600px;
    background:rgba(20,20,30,0.55);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:30px;
    overflow:hidden;
      position:relative;
    box-shadow:0 0 40px #ff00ff;
    display:flex;
    flex-direction:column;
      position:relative;
z-index:1;
}

.header{
    padding:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:white;
    background:rgba(255,255,255,0.05);
}

.messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
    color:white;
}

.message{
    background:#2b2b3d;
    padding:12px;
    margin:10px 0;
    border-radius:15px;
    color:white;
}

.user{
    background:#ff00ff;
}

.input-area{
    display:flex;
    padding:10px;
    background:rgba(0,0,0,0.4);
}

input{
   height:100%; 
  flex:1;
    padding:12px;
    border:none;
    border-radius:15px;
    background:#1e1e1e;
    color:white;
}

button{
    margin-left:8px;
    border:none;
    border-radius:15px;
    padding:12px 16px;
    background:#ff00ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 15px #ff00ff;
}
    .ai-orb{
    width:80px;
    height:80px;
    margin:0 auto 10px;
    border-radius:50%;
    background:radial-gradient(circle,#ff00ff,#6a00ff,#000);
    box-shadow:
    0 0 20px #ff00ff,
    0 0 60px #6a00ff;
    animation:floatOrb 3s infinite ease-in-out;
}

@keyframes floatOrb{
    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-12px);
    }

    100%{
        transform:translateY(0px);
    }
}
  /* SIDEBAR */

.sidebar{

position:fixed;

top:20px;
left:-270px;
  
width:220px;
height:100%;
  height:90vh;
border-radius:25px;
display:flex;
flex-direction:column;
  overflow-y:auto;
  
background:rgba(10,10,20,0.95);

padding:20px;

transition:0.4s;

z-index:999999;

backdrop-filter:blur(20px);

box-shadow:
0 0 30px #ff00ff;
border:1px solid rgba(255,255,255,0.1);
}

.sidebar h2{

color:white;

}

.sidebar button{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:12px;

background:#ff00ff;

color:white;

font-size:16px;

}
.old-chat{
width:100%;
margin-top:10px;
padding:10px;
background:#1e1e1e;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}
/* MENU BUTTON */

.menu-btn{

position:absolute;

top:20px;

left:20px;

width:50px;
height:50px;

display:flex;
justify-content:center;
align-items:center;

background:#ff00ff;
color:white;

font-size:28px;
font-weight:bold;

border:none;
border-radius:15px;

cursor:pointer;

z-index:999999;

box-shadow:0 0 25px #ff00ff;

}
</style>

</head>

<body>
  
<div class="sidebar" id="sidebar">

<h2>Zenkai AI</h2>

<button onclick="newChat()">➕ New Chat</button>

<button onclick="clearChat()">🗑 Clear Chat</button>

<button onclick="toggleTheme()">🌙 Theme</button>

</div>

<div class="chat-container">
<button class="menu-btn" onclick="openSidebar()">
☰
</button>
<div class="header">
    <div class="ai-orb"></div>
👾 Zenkai AI
</div>

<div class="messages" id="messages">

<div class="message">
⚡ Zenkai AI Online

Ask me anything...
</div>

</div>

<div class="input-area">

<input type="text" id="input" placeholder="Ask something...">

<button onclick="sendMessage()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

</div>

<script>
let allChats = JSON.parse(localStorage.getItem("zenkaiChats")) || [];

let currentChat = [];
function sendMessage(){

let input = document.getElementById("input");

let text = input.value;

if(text==="") return;

let messages = document.getElementById("messages");

let userMessage = document.createElement("div");

userMessage.className = "message user";

userMessage.innerText = text;
currentChat.push({
sender:"user",
text:text
});
messages.appendChild(userMessage);

let aiMessage = document.createElement("div");

aiMessage.className = "message";

aiMessage.innerText = "🤖 Thinking...";
  
/* Typing animation */

let dots = 0;

let thinking = setInterval(()=>{

dots++;

if(dots > 3){
dots = 0;
}

aiMessage.innerText =
"🤖 Thinking" + ".".repeat(dots);

},500);
messages.appendChild(aiMessage);

getAIResponse(text).then(reply => {
clearInterval(thinking);
aiMessage.innerText = reply;
currentChat.push({
sender:"ai",
text:reply
});

saveChat();
});

input.value="";

messages.scrollTop = messages.scrollHeight;

}

async function getAIResponse(userText){

userText = userText.toLowerCase();

if(userText.includes("hello")){
return "👋 Hello! I am Zenkai AI.";
}

else if(userText.includes("your name")){
return "🤖 My name is Zenkai AI.";
}

  else if(userText.includes("how was harshita ")){
return ' she was an girl live in ajmer rajasthan india 
  there brother was famous and he give them nick name which is dingi bai !';
  }
else if(userText.includes("who made you")){
return "⚡ I was created by Nischal Sharma.";
}

else if(userText.includes("how are you")){
return "😎 I am futuristic and fully operational!";
}

else if(userText.includes("bye")){
return "👋 Goodbye Commander!";
}

else{
return "⚡ Zenkai AI is learning new responses...";
}

}

function startVoice(){

let recognition =
new(window.SpeechRecognition ||
window.webkitSpeechRecognition)();

recognition.lang = "en-US";

recognition.start();
recognition.onerror = function(){

alert("Mic permission denied");

};
recognition.onresult = function(event){

let transcript =
event.results[0][0].transcript;

document.getElementById("input").value =
transcript;

sendMessage();
}
}
/* ENTER KEY SEND */

document.getElementById("input")
.addEventListener("keydown", function(event){

if(event.key === "Enter"){

event.preventDefault();

sendMessage();

}

});
  /* SIDEBAR */

function openSidebar(){

let sidebar =
document.getElementById("sidebar");

if(sidebar.style.left == "20px"){

sidebar.style.left = "-260px";

}else{

sidebar.style.left = "0px";

}

}

/* NEW CHAT */

function newChat(){

document.getElementById("messages")
.innerHTML = "";
currentChat = [];
}

/* CLEAR CHAT */

function clearChat(){

document.getElementById("messages")
.innerHTML = "";

}
  
/* THEME */

function toggleTheme(){

if(document.body.classList.contains("light")){

document.body.classList.remove("light");

document.body.style.background =
"linear-gradient(-45deg,#050010,#140021,#240046,#000000)";

}else{

document.body.classList.add("light");

document.body.style.background =
"linear-gradient(135deg,#000,#240046,#ff00ff)";

}
  function saveChat(){

if(currentChat.length > 0){

allChats.push([...currentChat]);

localStorage.setItem(
"zenkaiChats",
JSON.stringify(allChats)
);

loadSidebarChats();
console.log("JS WORKING");
}

  }
  function loadSidebarChats(){

let sidebar =
document.getElementById("sidebar");

let old =
document.querySelectorAll(".old-chat");

old.forEach(chat => chat.remove());

allChats.forEach((chat,index)=>{

let btn =
document.createElement("button");

btn.className = "old-chat";

btn.innerText =
"💬 Chat " + (index + 1);

btn.onclick = function(){

loadChat(index);

};

sidebar.appendChild(btn);

});

  }
  function loadChat(index){

let messages =
document.getElementById("messages");

messages.innerHTML = "";

allChats[index].forEach(msg=>{

let div =
document.createElement("div");

div.className =
msg.sender === "user"
? "message user"
: "message";

div.innerText = msg.text;

messages.appendChild(div);

});

}
loadSidebarChats();

</script>

</body>
</html>

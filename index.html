1<!DOCTYPE html>
<html>
<head>

<title>Zenkai AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#0f0c29,#302b63,#24243e);
overflow:hidden;
}

body::before{
content:'';
position:absolute;
width:600px;
height:600px;
background:#bb00ff;
filter:blur(200px);
opacity:0.3;
top:-100px;
left:-100px;
animation:move 8s infinite alternate;
}

@keyframes move{
from{
transform:translateX(0px);
}
to{
transform:translateX(200px);
}
}

.chatbox{
position:relative;
width:420px;
height:650px;
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:30px;
overflow:hidden;
box-shadow:
0 0 30px rgba(187,0,255,0.5);
display:flex;
flex-direction:column;
z-index:1;
}

.header{
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:white;
background:rgba(255,255,255,0.05);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
display:block;
margin:auto;
margin-bottom:10px;
box-shadow:
0 0 30px #ff00ff;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
box-shadow:0 0 20px #ff00ff;
}
to{
box-shadow:0 0 50px #00ffff;
}
}

.messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:15px;
}

.message{
padding:15px;
border-radius:20px;
max-width:80%;
font-size:15px;
line-height:1.5;
background:rgba(255,255,255,0.08);
color:white;
backdrop-filter:blur(10px);
}

.user{
align-self:flex-end;
background:#bb00ff;
}

.input-area{
display:flex;
padding:15px;
gap:10px;
background:rgba(255,255,255,0.05);
border-top:1px solid rgba(255,255,255,0.1);
}

input{
flex:1;
padding:15px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,0.08);
color:white;
font-size:15px;
}

button{
border:none;
padding:15px;
border-radius:15px;
background:#bb00ff;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ff00ff;
}
</style>

</head>

<body>

<div class="chatbox">

<div class="header">
  <img src="https://i.imgur.com/8Km9tLL.png" class="avatar">
👾 Zenkai AI
</div>

<div class="messages" id="messages">

<div class="message">
⚡ Zenkai AI Online

Ask me anything...
</div>

</div>

<div class="input-area">

<input type="text" id="input" placeholder="Ask something...">

<button onclick="sendMessage()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

</div>

<script>

function sendMessage(){

let input = document.getElementById("input");

let text = input.value;

if(text==="") return;

let messages = document.getElementById("messages");

let userMessage = document.createElement("div");

userMessage.className = "message user";

userMessage.innerText = text;

messages.appendChild(userMessage);

let aiMessage = document.createElement("div");

aiMessage.className = "message";

aiMessage.innerText = "🤖 Thinking...";

messages.appendChild(aiMessage);

getAIResponse(text).then(reply => {

aiMessage.innerText = reply;

});

input.value="";

messages.scrollTop = messages.scrollHeight;

}

async function getAIResponse(userText){

userText = userText.toLowerCase();

if(userText.includes("hello")){
return "👋 Hello! I am Zenkai AI.";
}

else if(userText.includes("your name")){
return "🤖 My name is Zenkai AI.";
}

else if(userText.includes("who made you")){
return "⚡ I was created by Nischal Sharma.";
}

else if(userText.includes("how are you")){
return "😎 I am futuristic and fully operational!";
}

else if(userText.includes("bye")){
return "👋 Goodbye Commander!";
}

else{
return "⚡ Zenkai AI is learning new responses...";
}

}

function startVoice(){

let recognition = new webkitSpeechRecognition();

recognition.lang = "en-US";

recognition.start();

recognition.onresult = function(event){

document.getElementById("input").value =
event.results[0][0].transcript;

sendMessage();

}

}

</script>

</body>
</html>
